services:
  # App Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-cloud-app
    container_name: mini-cloud-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - mini-cloud-network

  # Web Server (Nginx)
  nginx:
    image: nginx:stable-alpine
    container_name: mini-cloud-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mini-cloud-network
    depends_on:
      - app

  # Database (MySQL)
  db:
    image: mysql:8.0
    container_name: mini-cloud-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mini_cloud}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-root}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - mini-cloud-network

networks:
  mini-cloud-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
